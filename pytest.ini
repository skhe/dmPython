[pytest]
addopts = -ra
testpaths =
    tests
faulthandler_timeout = 120
asyncio_default_fixture_loop_scope = function
markers =
    requires_dm: tests requiring a reachable Dameng database instance
    p0_stability: critical crash/stability guards
    p1_contract: API contract tests
    p2_scale: scale and stress tests
    crash_guard: subprocess crash-detection tests
